name: Validate site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile updater
        run: python -m py_compile update_research_focus.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Dry-run payload build
        run: python update_research_focus.py --stdout-only > /tmp/research-focus.json
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
